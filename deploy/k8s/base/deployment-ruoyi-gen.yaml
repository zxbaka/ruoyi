apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-gen
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: ruoyi-gen
    app.kubernetes.io/component: gen
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ruoyi-gen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ruoyi-gen
        app.kubernetes.io/component: gen
        app.kubernetes.io/part-of: ruoyi-cloud
    spec:
      imagePullSecrets:
        - name: ruoyi-harbor
      containers:
        - name: ruoyi-gen
          image: harbor.example.com/ruoyi/ruoyi-modules-gen:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9202
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_ADDR
            - name: SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_NAMESPACE
            - name: SPRING_CLOUD_NACOS_DISCOVERY_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_USERNAME
            - name: SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_PASSWORD
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_ADDR
            - name: SPRING_CLOUD_NACOS_CONFIG_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_NAMESPACE
            - name: SPRING_CLOUD_NACOS_CONFIG_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_USERNAME
            - name: SPRING_CLOUD_NACOS_CONFIG_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: NACOS_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: JAVA_OPTS
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-gen
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: ruoyi-gen
    app.kubernetes.io/component: gen
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  selector:
    app.kubernetes.io/name: ruoyi-gen
  ports:
    - port: 9202
      targetPort: http
      name: http
  type: ClusterIP
