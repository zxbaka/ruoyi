apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-ui
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: ruoyi-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ruoyi-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ruoyi-ui
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: ruoyi-cloud
    spec:
      imagePullSecrets:
        - name: ruoyi-harbor
      containers:
        - name: ruoyi-ui
          image: harbor.example.com/ruoyi/ruoyi-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-ui
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: ruoyi-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  selector:
    app.kubernetes.io/name: ruoyi-ui
  ports:
    - port: 80
      targetPort: http
      name: http
  type: ClusterIP
