apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql
  serviceName: mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql
        app.kubernetes.io/part-of: ruoyi-cloud
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ruoyi-mysql
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ruoyi-mysql
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ruoyi-mysql
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  selector:
    app.kubernetes.io/name: mysql
  ports:
    - port: 3306
      targetPort: mysql
      name: mysql
