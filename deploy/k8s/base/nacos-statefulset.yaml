apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nacos
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  serviceName: nacos-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nacos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nacos
        app.kubernetes.io/part-of: ruoyi-cloud
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.2.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8848
              name: client
            - containerPort: 9848
              name: cluster
            - containerPort: 9849
              name: cluster-raft
          env:
            - name: MODE
              value: standalone
            - name: SPRING_DATASOURCE_PLATFORM
              value: mysql
            - name: MYSQL_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: MYSQL_HOST
            - name: MYSQL_SERVICE_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: MYSQL_DATABASE
            - name: MYSQL_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: ruoyi-env
                  key: MYSQL_PORT
            - name: MYSQL_SERVICE_USER
              valueFrom:
                secretKeyRef:
                  name: ruoyi-mysql
                  key: MYSQL_USER
            - name: MYSQL_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ruoyi-mysql
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: nacos-data
              mountPath: /home/nacos/data
            - name: nacos-logs
              mountPath: /home/nacos/logs
      volumes:
        - name: nacos-data
          emptyDir: {}
        - name: nacos-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  selector:
    app.kubernetes.io/name: nacos
  ports:
    - port: 8848
      targetPort: client
      name: client
    - port: 9848
      targetPort: cluster
      name: cluster
    - port: 9849
      targetPort: cluster-raft
      name: cluster-raft
---
apiVersion: v1
kind: Service
metadata:
  name: nacos-headless
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: nacos
  ports:
    - port: 8848
      targetPort: client
      name: client
