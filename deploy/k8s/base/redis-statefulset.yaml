apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: ruoyi-cloud
    spec:
      containers:
        - name: redis
          image: redis:6.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - redis-server
            - "--appendonly"
            - "yes"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: redis
      name: redis
