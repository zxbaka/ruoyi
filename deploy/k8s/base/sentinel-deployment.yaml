apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: sentinel
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel
        app.kubernetes.io/part-of: ruoyi-cloud
    spec:
      containers:
        - name: sentinel
          image: bladex/sentinel-dashboard:1.8.6
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_OPTS
              value: "-Dserver.port=8718 -Dcsp.sentinel.dashboard.server=127.0.0.1:8718 -Dproject.name=sentinel-dashboard"
          ports:
            - containerPort: 8718
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel
  namespace: ruoyi
  labels:
    app.kubernetes.io/name: sentinel
    app.kubernetes.io/part-of: ruoyi-cloud
spec:
  selector:
    app.kubernetes.io/name: sentinel
  type: ClusterIP
  ports:
    - port: 8718
      targetPort: http
      name: http
